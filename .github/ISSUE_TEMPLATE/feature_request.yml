name: Feature request
description: 提出一个功能增强建议
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        欢迎提出改进建议。请尽量说明使用场景、动机和预期收益。
  - type: textarea
    id: problem
    attributes:
      label: 你要解决的问题
      placeholder: 当前有什么痛点或限制？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      placeholder: 你希望项目如何支持？
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      placeholder: 你考虑过哪些替代方案？
  - type: textarea
    id: impact
    attributes:
      label: 影响面
      placeholder: 是否影响 API / SPI / Demo / 文档 / 兼容性？
